services:
  typesense:
    image: typesense/typesense:27.1
    ports:
      - "8108:8108"
    volumes:
      - typesense-data:/data
    command: >
      --data-dir /data
      --api-key=${TYPESENSE_API_KEY:-sia_typesense_dev_key}
      --enable-cors
    restart: unless-stopped

volumes:
  typesense-data:
